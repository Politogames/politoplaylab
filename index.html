<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 ASTROBOT - Misión Tabla del 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Nunito:wght@700;800;900&display=swap');

/* ═══════════════════════════════
VARIABLES — PALETA ASTROBOT
═══════════════════════════════ */
:root {
–bg-space:       #030d1e;
–bg-panel:       #071428;
–bg-panel-inner: #050f22;
–bg-stat:        #060e20;
–bg-option:      #081326;
–bg-option-hover:#0c1e3a;
–text-white:     #ffffff;
–text-light:     #bfefff;
–text-muted:     #6e9ab8;
–accent:         #00d4ff;
–accent-glow:    rgba(0,212,255,0.35);
–accent-dim:     rgba(0,212,255,0.18);
–correct:        #00ff88;
–correct-bg:     rgba(0,255,136,0.12);
–correct-border: rgba(0,255,136,0.55);
–wrong:          #ff4d6d;
–wrong-bg:       rgba(255,77,109,0.12);
–wrong-border:   rgba(255,77,109,0.55);
–border-panel:   rgba(0,212,255,0.22);
–border-strong:  rgba(0,212,255,0.5);
–yellow:         #ffe44d;
–green-level:    #00ff88;
–red-level:      #ff4d6d;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg-space);
font-family: ‘Nunito’, sans-serif;
color: var(–text-white);
min-height: 100vh;
overflow-x: hidden;
position: relative;
}

/* FONDO ESPACIAL */
#stars {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
pointer-events: none; z-index: 0; overflow: hidden;
}
#stars::before, #stars::after {
content: ‘’; position: absolute; width: 100%; height: 100%;
}
#stars::before {
background-image:
radial-gradient(1px 1px at 8%  12%, rgba(255,255,255,0.9), transparent),
radial-gradient(1px 1px at 22% 67%, rgba(255,255,255,0.7), transparent),
radial-gradient(2px 2px at 38% 28%, rgba(255,255,255,1.0), transparent),
radial-gradient(1px 1px at 54% 83%, rgba(255,255,255,0.6), transparent),
radial-gradient(1px 1px at 68% 18%, rgba(255,255,255,0.8), transparent),
radial-gradient(2px 2px at 83% 52%, rgba(255,255,255,0.9), transparent),
radial-gradient(1px 1px at 91% 9%,  rgba(255,255,255,1.0), transparent),
radial-gradient(1px 1px at 14% 91%, rgba(255,255,255,0.7), transparent),
radial-gradient(1px 1px at 59% 44%, rgba(255,255,255,0.5), transparent),
radial-gradient(1px 1px at 33% 37%, rgba(255,255,255,0.6), transparent),
radial-gradient(1px 1px at 76% 76%, rgba(255,255,255,0.8), transparent),
radial-gradient(2px 2px at 47% 4%,  rgba(0,212,255,0.8),  transparent),
radial-gradient(1px 1px at 4%  55%, rgba(0,212,255,0.5),  transparent),
radial-gradient(1px 1px at 96% 88%, rgba(255,238,0,0.6),  transparent),
radial-gradient(1px 1px at 72% 33%, rgba(255,255,255,0.4), transparent),
radial-gradient(1px 1px at 18% 48%, rgba(255,255,255,0.7), transparent),
radial-gradient(1px 1px at 88% 22%, rgba(0,212,255,0.4),  transparent),
radial-gradient(2px 2px at 62% 72%, rgba(255,255,255,0.5), transparent);
animation: twinkle 6s ease-in-out infinite alternate;
}
#stars::after {
background-image:
radial-gradient(1px 1px at 5%  30%, rgba(255,255,255,0.5), transparent),
radial-gradient(1px 1px at 44% 58%, rgba(255,255,255,0.6), transparent),
radial-gradient(1px 1px at 79% 41%, rgba(255,255,255,0.4), transparent),
radial-gradient(1px 1px at 29% 79%, rgba(0,212,255,0.3),  transparent),
radial-gradient(1px 1px at 66% 14%, rgba(255,255,255,0.7), transparent),
radial-gradient(1px 1px at 93% 63%, rgba(255,238,0,0.3),  transparent);
animation: twinkle 9s ease-in-out infinite alternate-reverse;
}
@keyframes twinkle {
0%   { opacity: 0.6; }
50%  { opacity: 1.0; }
100% { opacity: 0.7; }
}
body::before {
content: ‘’;
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
background:
radial-gradient(ellipse 60% 40% at 20% 30%, rgba(0,60,120,0.18) 0%, transparent 70%),
radial-gradient(ellipse 50% 35% at 80% 70%, rgba(0,30,90,0.15) 0%, transparent 70%);
pointer-events: none; z-index: 0;
}

#app {
position: relative; z-index: 1;
max-width: 660px;
margin: 0 auto;
padding: 16px 16px 40px;
min-height: 100vh;
}

/* HEADER */
.game-header { text-align: center; padding: 22px 0 14px; }
.game-title {
font-family: ‘Orbitron’, monospace;
font-size: clamp(1.6rem, 6vw, 2.4rem);
font-weight: 900;
color: var(–accent);
text-shadow: 0 0 12px var(–accent), 0 0 28px rgba(0,212,255,0.5), 0 0 60px rgba(0,212,255,0.2);
letter-spacing: 4px;
animation: flicker 5s infinite;
}
.game-subtitle {
font-family: ‘Press Start 2P’, monospace;
font-size: 0.52rem;
color: var(–yellow);
margin-top: 7px;
letter-spacing: 2px;
text-shadow: 0 0 8px rgba(255,228,77,0.5);
}
@keyframes flicker {
0%,92%,100%{ opacity:1; }
93%{ opacity:0.75; }
94%{ opacity:1; }
96%{ opacity:0.55; }
97%{ opacity:1; }
}

/* PANEL */
.panel {
background: var(–bg-panel);
border: 1.5px solid var(–border-panel);
border-radius: 16px;
padding: 22px 20px;
margin: 12px 0;
box-shadow:
0 0 0 1px rgba(0,0,0,0.5),
0 4px 24px rgba(0,0,0,0.5),
0 0 40px rgba(0,212,255,0.04),
inset 0 1px 0 rgba(255,255,255,0.04);
}
.panel-title {
font-family: ‘Orbitron’, monospace;
font-size: 0.72rem;
font-weight: 700;
color: var(–accent);
letter-spacing: 2px;
margin-bottom: 14px;
display: flex;
align-items: center;
gap: 8px;
text-shadow: 0 0 8px var(–accent-glow);
}

/* LEVEL BUTTONS */
.level-btn {
display: block; width: 100%;
background: var(–bg-panel-inner);
border: 1.5px solid var(–border-panel);
border-radius: 12px;
padding: 18px 52px 18px 20px;
margin: 10px 0;
cursor: pointer; text-align: left;
transition: all 0.18s ease;
color: var(–text-white);
font-family: ‘Nunito’, sans-serif;
position: relative; overflow: hidden;
}
.level-btn:hover {
border-color: var(–accent);
background: var(–bg-option-hover);
box-shadow: 0 0 18px var(–accent-glow), inset 0 1px 0 rgba(255,255,255,0.05);
transform: translateY(-2px);
}
.level-btn .lvl-title {
font-family: ‘Orbitron’, monospace;
font-size: 0.82rem; font-weight: 700;
display: block; margin-bottom: 5px;
}
.level-btn .lvl-desc {
font-size: 0.95rem; font-weight: 700;
color: var(–text-light); line-height: 1.4;
}
.level-1 .lvl-title { color: var(–green-level); text-shadow: 0 0 8px rgba(0,255,136,0.5); }
.level-2 .lvl-title { color: var(–yellow);      text-shadow: 0 0 8px rgba(255,228,77,0.5); }
.level-3 .lvl-title { color: var(–red-level);   text-shadow: 0 0 8px rgba(255,77,109,0.5); }
.level-badge {
position: absolute; right: 18px; top: 50%;
transform: translateY(-50%); font-size: 1.7rem;
}

/* STATS */
.stats-bar {
display: flex; gap: 10px; flex-wrap: wrap;
align-items: stretch; margin-bottom: 14px;
}
.stat-block {
flex: 1; min-width: 110px;
background: var(–bg-stat);
border: 1.5px solid rgba(0,212,255,0.18);
border-radius: 10px; padding: 10px 14px 12px;
}
.stat-label {
font-family: ‘Press Start 2P’, monospace;
font-size: 0.42rem; color: var(–text-muted);
display: block; margin-bottom: 6px; letter-spacing: 1px;
}
.stat-value {
font-family: ‘Orbitron’, monospace;
font-size: 1.15rem; font-weight: 900;
color: var(–yellow);
text-shadow: 0 0 10px rgba(255,228,77,0.4);
line-height: 1;
}
.stat-value.cyan  { color: var(–accent);   text-shadow: 0 0 10px var(–accent-glow); }
.stat-value.green { color: var(–correct);  text-shadow: 0 0 10px rgba(0,255,136,0.4); }
.stat-value.pink  { color: var(–red-level);text-shadow: 0 0 10px rgba(255,77,109,0.4); }
.energy-display { font-size: 1.25rem; letter-spacing: 3px; line-height: 1.2; }
.lives-display  { font-size: 1.35rem; letter-spacing: 3px; line-height: 1.2; }

/* ASTROBOT */
.astrobot-container { text-align: center; padding: 6px 0 4px; }
.astrobot {
font-size: 3.8rem; display: inline-block;
animation: float 3s ease-in-out infinite;
filter: drop-shadow(0 0 14px rgba(0,212,255,0.6)) drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}
@keyframes float {
0%,100% { transform: translateY(0px) rotate(0deg); }
50%      { transform: translateY(-9px) rotate(1deg); }
}
.astrobot.shake { animation: shake 0.4s ease; }
@keyframes shake {
0%,100%{ transform:translateX(0) }
20%{ transform:translateX(-7px) }
40%{ transform:translateX(7px) }
60%{ transform:translateX(-5px) }
80%{ transform:translateX(5px) }
}
.astrobot.bounce { animation: abounce 0.45s ease; }
@keyframes abounce {
0%,100%{ transform:translateY(0) scale(1) }
40%{ transform:translateY(-14px) scale(1.12) }
70%{ transform:translateY(-6px) scale(1.05) }
}

/* SPEECH BUBBLE */
.speech-bubble {
background: rgba(0,212,255,0.07);
border: 1.5px solid rgba(0,212,255,0.3);
border-radius: 14px; padding: 14px 18px;
margin: 8px 0 12px;
font-size: 1.05rem; font-weight: 800;
color: var(–text-white); line-height: 1.55;
text-align: center; position: relative;
}
.speech-bubble::before {
content: ‘▲’; position: absolute;
top: -12px; left: 50%; transform: translateX(-50%);
color: rgba(0,212,255,0.35); font-size: 0.85rem;
}

/* PROGRESS */
.progress-track {
background: rgba(0,0,0,0.4);
border: 1px solid rgba(0,212,255,0.12);
border-radius: 6px; height: 8px;
margin: 6px 0; overflow: hidden;
}
.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–accent), var(–correct));
border-radius: 6px; transition: width 0.45s ease;
box-shadow: 0 0 10px rgba(0,212,255,0.6);
}
.question-counter {
font-family: ‘Press Start 2P’, monospace;
font-size: 0.42rem; color: var(–text-muted);
text-align: right; margin: 4px 0 12px; letter-spacing: 1px;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
QUESTION — MÁXIMO CONTRASTE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.question-area { text-align: center; }
.mission-tag {
font-family: ‘Press Start 2P’, monospace;
font-size: 0.5rem; color: var(–text-muted);
letter-spacing: 2px; margin-bottom: 10px; display: block;
}
.question-text {
display: block;
font-family: ‘Orbitron’, monospace;
font-size: clamp(1.7rem, 7vw, 2.4rem);
font-weight: 900;
color: #ffffff !important;
background: var(–bg-panel-inner);
border: 2px solid var(–border-strong);
border-radius: 14px;
padding: 18px 16px;
margin: 0 0 16px;
letter-spacing: 2px; text-align: center;
text-shadow: 0 0 16px rgba(0,212,255,0.7), 0 2px 4px rgba(0,0,0,0.9);
box-shadow: 0 0 24px rgba(0,212,255,0.12), inset 0 2px 0 rgba(255,255,255,0.04);
line-height: 1.2;
}

/* OPTIONS */
.options-grid {
display: grid; grid-template-columns: 1fr 1fr 1fr;
gap: 10px; margin: 0 0 4px;
}
.option-btn {
background: var(–bg-option);
border: 2px solid rgba(0,212,255,0.3);
border-radius: 12px; padding: 16px 8px 14px;
cursor: pointer;
font-family: ‘Orbitron’, monospace;
font-weight: 900; font-size: 1.25rem;
color: #ffffff;
transition: all 0.15s ease; text-align: center; line-height: 1;
}
.option-btn:hover:not(:disabled) {
background: var(–bg-option-hover);
border-color: var(–accent);
color: #ffffff;
box-shadow: 0 0 16px var(–accent-glow);
transform: scale(1.05) translateY(-1px);
}
.option-btn.correct {
background: var(–correct-bg) !important;
border-color: var(–correct) !important;
color: var(–correct) !important;
box-shadow: 0 0 20px rgba(0,255,136,0.35) !important;
text-shadow: 0 0 8px rgba(0,255,136,0.6);
}
.option-btn.wrong {
background: var(–wrong-bg) !important;
border-color: var(–wrong) !important;
color: var(–wrong) !important;
box-shadow: 0 0 14px rgba(255,77,109,0.3) !important;
}
.option-btn:disabled { cursor: default; }
.option-label {
font-family: ‘Press Start 2P’, monospace;
font-size: 0.45rem; display: block;
color: var(–text-muted); margin-bottom: 6px; letter-spacing: 1px;
}

/* FEEDBACK */
.feedback-box {
border-radius: 12px; padding: 16px 18px;
margin: 14px 0 10px;
font-size: 1.05rem; font-weight: 800;
line-height: 1.55; animation: fadeSlideIn 0.3s ease;
}
.feedback-box.correct {
background: var(–correct-bg);
border: 2px solid var(–correct-border);
color: var(–correct);
text-shadow: 0 0 6px rgba(0,255,136,0.3);
}
.feedback-box.wrong {
background: var(–wrong-bg);
border: 2px solid var(–wrong-border);
color: var(–wrong);
text-shadow: 0 0 6px rgba(255,77,109,0.3);
}
.feedback-box strong { color: #ffffff; font-size: 1.1em; }
.feedback-box small {
display: block; margin-top: 6px;
font-size: 0.92rem; color: var(–text-light); font-weight: 700;
}
@keyframes fadeSlideIn {
from { opacity:0; transform:translateY(10px); }
to   { opacity:1; transform:translateY(0); }
}

/* BUTTONS */
.btn-next {
width: 100%;
background: linear-gradient(135deg, rgba(0,212,255,0.15) 0%, rgba(0,100,180,0.2) 100%);
border: 2px solid var(–accent);
border-radius: 12px; padding: 15px 20px;
cursor: pointer;
font-family: ‘Orbitron’, monospace;
font-weight: 700; font-size: 0.82rem;
color: var(–accent); letter-spacing: 2px;
transition: all 0.18s ease; margin-top: 10px;
text-shadow: 0 0 8px var(–accent-glow);
box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.btn-next:hover {
background: rgba(0,212,255,0.22);
box-shadow: 0 0 22px var(–accent-glow), 0 2px 12px rgba(0,0,0,0.3);
transform: translateY(-1px);
}
.btn-next.start {
background: linear-gradient(135deg, rgba(0,255,136,0.15) 0%, rgba(0,120,70,0.2) 100%);
border-color: var(–correct); color: var(–correct);
text-shadow: 0 0 8px rgba(0,255,136,0.4);
}
.btn-next.start:hover { background: rgba(0,255,136,0.2); box-shadow: 0 0 22px rgba(0,255,136,0.3); }
.btn-next.restart {
background: linear-gradient(135deg, rgba(255,228,77,0.15) 0%, rgba(180,120,0,0.15) 100%);
border-color: var(–yellow); color: var(–yellow);
text-shadow: 0 0 8px rgba(255,228,77,0.4);
}
.btn-next.restart:hover { background: rgba(255,228,77,0.18); box-shadow: 0 0 22px rgba(255,228,77,0.25); }

/* STARS ROW */
.stars-row { font-size: 1.4rem; letter-spacing: 4px; line-height: 1; }

/* SCREEN TRANSITION */
.screen { animation: screenIn 0.32s ease; }
@keyframes screenIn {
from { opacity:0; transform:translateY(14px); }
to   { opacity:1; transform:translateY(0); }
}

/* DIVIDER */
.divider { border: none; border-top: 1px solid rgba(0,212,255,0.12); margin: 14px 0; }

/* RANKING */
.ranking-screen { text-align: center; }
.ranking-badge {
font-size: 4.5rem; display: block;
margin: 6px 0 4px; animation: pulse 1.6s ease-in-out infinite;
filter: drop-shadow(0 0 16px rgba(255,228,77,0.5));
}
@keyframes pulse {
0%,100%{ transform:scale(1) rotate(0deg); }
50%{ transform:scale(1.1) rotate(3deg); }
}
.ranking-title {
font-family: ‘Orbitron’, monospace;
font-size: clamp(1.2rem, 5vw, 1.9rem);
font-weight: 900; margin: 8px 0 4px; letter-spacing: 1px;
}
.ranking-title.gold   { color: var(–yellow);  text-shadow: 0 0 20px rgba(255,228,77,0.6); }
.ranking-title.silver { color: #a8d8ff;        text-shadow: 0 0 20px rgba(168,216,255,0.5); }
.ranking-title.green  { color: var(–correct); text-shadow: 0 0 20px rgba(0,255,136,0.5); }
.ranking-score {
font-family: ‘Press Start 2P’, monospace;
font-size: 0.85rem; color: var(–accent);
margin: 14px 0; text-shadow: 0 0 10px var(–accent-glow);
}
.ranking-msg {
font-size: 1.1rem; font-weight: 800;
line-height: 1.6; color: var(–text-light); margin: 10px 0 16px;
}

/* MEDALS */
.medals-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 10px 0; }
.medal {
background: var(–bg-stat);
border: 1.5px solid rgba(0,212,255,0.2);
border-radius: 8px; padding: 7px 14px;
font-size: 0.92rem; font-weight: 800; color: var(–text-light);
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.25); border-radius: 4px; }

.menu-hint {
font-family: ‘Press Start 2P’, monospace;
font-size: 0.48rem; color: var(–text-muted);
line-height: 2.2; letter-spacing: 0.5px;
}
</style>

</head>
<body>
<div id="stars"></div>
<div id="app">

  <div class="game-header">
    <div class="game-title">🚀 ASTROBOT</div>
    <div class="game-subtitle">★ MISIÓN TABLA DEL 2 ★</div>
  </div>

  <div id="screen"></div>

</div>

<script>

      { q: "¿? × 2 = 8",       a: 4,  opts: [3, 4, 5],   msg: "¡Resolviste una pregunta inversa! 🧩" },
      { q: "2 × 9 = ?",        a: 18, opts: [16, 18, 20], msg: "¡Astrobot te aplaude! 👏" },
      { q: "¿? × 2 = 12",      a: 6,  opts: [5, 6, 7],   msg: "¡Eres un detective espacial! 🔍" },
      { q: "2 × 4 = ?",        a: 8,  opts: [6, 8, 10],  msg: "¡Ni se te escapa ninguna! 🎯" },
      { q: "¿? × 2 = 20",      a: 10, opts: [8, 10, 12],  msg: "¡MISIÓN AVANZADA SUPERADA! 🏆" },
    ],
    maxEnergy: 5,
    winMsg: "¡Llegamos al Planeta Áureo! Astrobot enciende sus luces de celebración. ¡MASTER ESPACIAL!",
  },
  3: {
    name: "DESAFÍO ESPACIAL",
    subtitle: "Nivel Difícil",
    emoji: "💥",
    story: [
      "🚨 ¡ALERTA ESPACIAL! 🚨",
      "¡Un meteorito amenaza el Planeta Tierra! ☄️",
      "Solo Astrobot puede activar el escudo protector...",
      "¡Pero necesita TU ayuda para resolver los códigos!",
      "Tienes 3 vidas 💔💔💔 — ¡No las pierdas!",
      "¡EL PLANETA DEPENDE DE TI! 🌍"
    ],
    questions: [
      { q: "2 × 8 = ?",        a: 16, opts: [14, 16, 18], msg: "¡Código activado! 🛡️" },
      { q: "¿? × 2 = 6",       a: 3,  opts: [2, 3, 4],   msg: "¡Detective espacial! 🔍" },
      { q: "2 × 7 = ?",        a: 14, opts: [12, 14, 16], msg: "¡El escudo crece! ⚡" },
      { q: "2 × 6 = ?",        a: 12, opts: [10, 12, 14], msg: "¡Excelente! 💪" },
      { q: "¿? × 2 = 18",      a: 9,  opts: [8, 9, 10],  msg: "¡Increíble! 🌟" },
      { q: "2 × 9 = ?",        a: 18, opts: [16, 18, 20], msg: "¡El meteorito retrocede! ☄️💥" },
      { q: "¿? × 2 = 14",      a: 7,  opts: [6, 7, 8],   msg: "¡Genio espacial! 🧠" },
      { q: "2 × 5 = ?",        a: 10, opts: [8, 10, 12],  msg: "¡Sigues fuerte! 💥" },
      { q: "2 × 10 = ?",       a: 20, opts: [18, 20, 22], msg: "¡El escudo al máximo! 🛡️⚡" },
      { q: "¿? × 2 = 16",      a: 8,  opts: [7, 8, 9],   msg: "¡PLANETA SALVADO! 🌍✨🎆" },
    ],
    maxLives: 3,
    winMsg: "¡EL PLANETA TIERRA ESTÁ SALVO! Eres el HÉROE GALÁCTICO. ¡Astrobot y toda la galaxia te aplauden!",
  }
};

const CORRECT_MSGS = [
  "¡Correcto! ¡Eres increíble! 🌟",
  "¡Exacto! ¡Qué listo/a! 🧠",
  "¡Perfecto! ¡Lo sabías! 💪",
  "¡Brillante! ¡Sigue así! ⭐",
  "¡WOW! ¡Eso estuvo genial! 🚀",
];
const WRONG_MSGS = [
  "¡Ups! ¡Tú puedes! 💪",
  "¡Casi! La próxima la clavas 🌟",
  "¡No pasa nada! ¡Sigue adelante! 🤖",
  "¡Ánimo! ¡Eres un explorador valiente! 💫",
];

const STARS = ["⭐","🌟","💫","✨"];

// ═══════════════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════════════

let state = {
  screen: 'menu',
  level: null,
  questionIndex: 0,
  score: 0,
  energy: 5,
  lives: 3,
  stars: [],
  answered: false,
  selectedOpt: null,
  storyIndex: 0,
};

function reset(level) {
  const lv = LEVELS[level];
  state = {
    screen: 'story',
    level,
    questionIndex: 0,
    score: 0,
    energy: lv.maxEnergy || 5,
    lives: lv.maxLives || 3,
    stars: [],
    answered: false,
    selectedOpt: null,
    storyIndex: 0,
  };
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════

function render() {
  const el = document.getElementById('screen');
  el.className = 'screen';
  if (state.screen === 'menu') el.innerHTML = renderMenu();
  else if (state.screen === 'story') el.innerHTML = renderStory();
  else if (state.screen === 'game') el.innerHTML = renderGame();
  else if (state.screen === 'result') el.innerHTML = renderResult();
}

function renderMenu() {
  return `
    <div class="panel" style="text-align:center; padding:26px 20px;">
      <div style="font-size:3.5rem; margin-bottom:10px; display:inline-block; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 14px rgba(0,212,255,0.6));">🤖</div>
      <div style="font-family:'Orbitron',monospace; font-size:0.72rem; color:var(--accent); margin-bottom:6px; letter-spacing:2px; text-shadow: 0 0 8px var(--accent-glow);">ASTROBOT DICE:</div>
      <div class="speech-bubble" style="margin:10px 0 20px;">
        ¡Hola explorador/a! 👋<br>
        Elige tu misión y ayúdame<br>a salvar la galaxia con<br>la <strong style="color:var(--accent);">tabla del 2</strong>! 🚀
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">⚡ ELIGE TU MISIÓN</div>

      <button class="level-btn level-1" onclick="startLevel(1)">
        <span class="lvl-title">🌙 JUEGO 1 — MISIÓN ASTROBOT</span>
        <span class="lvl-desc">Tabla del 2 en orden · Perfecta para comenzar · 5 🔋</span>
        <span class="level-badge">🟢</span>
      </button>

      <button class="level-btn level-2" onclick="startLevel(2)">
        <span class="lvl-title">⭐ JUEGO 2 — MISIÓN AVANZADA</span>
        <span class="lvl-desc">Preguntas mezcladas + inversas · Ojo con el 0 y el 10 · 5 🔋</span>
        <span class="level-badge">🟡</span>
      </button>

      <button class="level-btn level-3" onclick="startLevel(3)">
        <span class="lvl-title">💥 JUEGO 3 — DESAFÍO ESPACIAL</span>
        <span class="lvl-desc">Modo difícil · 3 vidas · ¡Salva el planeta! 🌍</span>
        <span class="level-badge">🔴</span>
      </button>
    </div>

    <div class="panel" style="text-align:center;">
      <div class="menu-hint">
        +10 PTS POR RESPUESTA CORRECTA &nbsp;·&nbsp; GANA ⭐ ESTRELLAS<br>
        🔋 ENERGÍA BAJA AL FALLAR &nbsp;·&nbsp; CONVIÉRTETE EN MAESTRO GALÁCTICO
      </div>
    </div>
  `;
}

function renderStory() {
  const lv = LEVELS[state.level];
  const lines = lv.story;
  const shown = lines.slice(0, state.storyIndex + 1);
  const isLast = state.storyIndex >= lines.length - 1;

  return `
    <div class="panel" style="text-align:center;">
      <div class="panel-title" style="justify-content:center;">${lv.emoji} ${lv.name} — ${lv.subtitle}</div>
      <div class="astrobot-container">
        <span class="astrobot" id="bot">🤖</span>
      </div>
      <div class="speech-bubble">
        ${shown.map((l,i) => `<div style="margin:5px 0; color:${i===shown.length-1?'#ffffff':'var(--text-light)'}; font-weight:${i===shown.length-1?'900':'700'};">${l}</div>`).join('')}
      </div>
      <button class="btn-next start" onclick="advanceStory()">
        ${isLast ? '🚀 ¡COMENZAR MISIÓN!' : '▶ SIGUIENTE'}
      </button>
    </div>
  `;
}

function renderGame() {
  const lv = LEVELS[state.level];
  const q = lv.questions[state.questionIndex];
  const total = lv.questions.length;
  const progress = ((state.questionIndex) / total) * 100;

  const isL3 = state.level === 3;

  // Build options
  const labels = ['A','B','C'];
  const optHtml = q.opts.map((opt, i) => {
    let cls = '';
    if (state.answered) {
      if (opt === q.a) cls = 'correct';
      else if (state.selectedOpt === opt) cls = 'wrong';
    }
    return `
      <button class="option-btn ${cls}" ${state.answered?'disabled':''} onclick="selectAnswer(${opt})">
        <span class="option-label">${labels[i]}</span>
        ${opt}
      </button>
    `;
  }).join('');

  // Energy / Lives display
  let statusHtml = '';
  if (isL3) {
    const heartsFull = '💔'.repeat(state.lives);
    const heartsEmpty = '🖤'.repeat(3 - state.lives);
    statusHtml = `
      <div class="stat-block">
        <span class="stat-label">VIDAS</span>
        <div class="lives-display">${heartsFull}${heartsEmpty}</div>
      </div>
    `;
  } else {
    const battFull = '🔋'.repeat(state.energy);
    const battEmpty = '🪫'.repeat(lv.maxEnergy - state.energy);
    statusHtml = `
      <div class="stat-block">
        <span class="stat-label">ENERGÍA</span>
        <div class="energy-display">${battFull}${battEmpty}</div>
      </div>
    `;
  }

  // Stars collected
  const starsHtml = state.stars.length ? `
    <div class="stat-block">
      <span class="stat-label">ESTRELLAS</span>
      <div class="stars-row">${state.stars.join('')}</div>
    </div>
  ` : '';

  // Feedback
  let feedbackHtml = '';
  if (state.answered) {
    const correct = state.selectedOpt === q.a;
    feedbackHtml = `
      <div class="feedback-box ${correct?'correct':'wrong'}">
        ${correct
          ? `✅ ¡CORRECTO! <strong>${q.a}</strong> es la respuesta. ${CORRECT_MSGS[state.questionIndex % CORRECT_MSGS.length]}`
          : `❌ ¡Casi! La respuesta era <strong>${q.a}</strong>. ${WRONG_MSGS[Math.floor(Math.random()*WRONG_MSGS.length)]}`
        }
        <small>${q.msg}</small>
      </div>
      <button class="btn-next" onclick="nextQuestion()">
        ${state.questionIndex + 1 >= total ? '🏆 VER RESULTADO' : '▶ SIGUIENTE PREGUNTA'}
      </button>
    `;
  }

  return `
    <div class="panel">
      <div class="stats-bar">
        <div class="stat-block">
          <span class="stat-label">PUNTAJE</span>
          <div class="stat-value">${state.score} PTS</div>
        </div>
        ${statusHtml}
        ${starsHtml}
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
      <div class="question-counter">
        PREGUNTA ${state.questionIndex+1} / ${total}
      </div>

      <div class="astrobot-container">
        <span class="astrobot" id="bot">🤖</span>
      </div>

      <div class="question-area">
        <span class="mission-tag">${lv.emoji} ${lv.name.toUpperCase()}</span>
        <div class="question-text">${q.q}</div>
        <div class="options-grid">${optHtml}</div>
      </div>

      ${feedbackHtml}
    </div>
  `;
}

function renderResult() {
  const lv = LEVELS[state.level];
  const maxScore = lv.questions.length * 10;
  const pct = (state.score / maxScore) * 100;

  let rankTitle, rankEmoji, rankColor, rankMsg;
  if (pct >= 90) {
    rankTitle = "MAESTRO GALÁCTICO"; rankEmoji = "🏆"; rankColor = "gold";
    rankMsg = "¡Eres una superestrella del espacio! Astrobot está emocionado. ¡LA GALAXIA ES TUYA! 🌌🎆";
  } else if (pct >= 70) {
    rankTitle = "EXPLORADOR ESTELAR"; rankEmoji = "⭐"; rankColor = "silver";
    rankMsg = "¡Muy bien hecho! Eres un gran explorador espacial. ¡Sigue practicando y llegarás al top! 🚀";
  } else if (pct >= 50) {
    rankTitle = "PILOTO ESPACIAL"; rankEmoji = "🚀"; rankColor = "green";
    rankMsg = "¡Buen trabajo! Tu nave está avanzando. ¡Con más práctica serás imparable! 💪";
  } else {
    rankTitle = "NOVATO CÓSMICO"; rankEmoji = "🌱"; rankColor = "green";
    rankMsg = "¡Todo explorador comienza desde cero! Inténtalo de nuevo y verás cómo mejoras. ¡Astrobot cree en ti! 🤖💙";
  }

  const correctAnswers = state.score / 10;
  const starsDisplay = state.stars.join('') || '—';

  return `
    <div class="panel ranking-screen">
      <div class="panel-title" style="justify-content:center;">🏁 RESULTADO FINAL</div>

      <span class="ranking-badge">${rankEmoji}</span>
      <div class="ranking-title ${rankColor}">${rankTitle}</div>

      <hr class="divider">

      <div class="ranking-score">PUNTAJE: ${state.score} / ${maxScore} PTS</div>

      <div class="medals-row">
        <div class="medal">✅ ${correctAnswers} correctas</div>
        <div class="medal">❌ ${lv.questions.length - correctAnswers} falladas</div>
        <div class="medal">⭐ ${state.stars.length} estrellas</div>
      </div>

      <div class="astrobot-container">
        <span class="astrobot" id="bot" style="font-size:3.2rem;">🤖</span>
      </div>

      <div class="speech-bubble">
        ${lv.winMsg || rankMsg}
      </div>

      <div class="ranking-msg">${rankMsg}</div>

      <div style="font-size:1.3rem; margin:8px 0; letter-spacing:4px;">${starsDisplay}</div>

      <button class="btn-next restart" onclick="startLevel(${state.level})">
        🔄 JUGAR DE NUEVO (Nivel ${state.level})
      </button>
      <button class="btn-next" style="margin-top:8px;" onclick="goMenu()">
        🏠 MENÚ PRINCIPAL
      </button>
    </div>
  `;
}

// ═══════════════════════════════════════════════
//  LÓGICA
// ═══════════════════════════════════════════════

function startLevel(n) {
  reset(n);
  render();
}

function advanceStory() {
  const lv = LEVELS[state.level];
  if (state.storyIndex < lv.story.length - 1) {
    state.storyIndex++;
    render();
  } else {
    state.screen = 'game';
    render();
  }
}

function selectAnswer(val) {
  if (state.answered) return;
  const lv = LEVELS[state.level];
  const q = lv.questions[state.questionIndex];
  const isL3 = state.level === 3;

  state.answered = true;
  state.selectedOpt = val;

  const correct = val === q.a;

  if (correct) {
    state.score += 10;
    // Award star every 2 correct answers
    if (state.score % 20 === 0) {
      state.stars.push(STARS[Math.floor(Math.random() * STARS.length)]);
    }
    // Animate bot
    setTimeout(() => {
      const bot = document.getElementById('bot');
      if (bot) { bot.classList.add('bounce'); setTimeout(() => bot.classList.remove('bounce'), 500); }
    }, 50);
  } else {
    if (isL3) {
      state.lives = Math.max(0, state.lives - 1);
    } else {
      state.energy = Math.max(0, state.energy - 1);
    }
    setTimeout(() => {
      const bot = document.getElementById('bot');
      if (bot) { bot.classList.add('shake'); setTimeout(() => bot.classList.remove('shake'), 500); }
    }, 50);
  }

  render();

  // Auto-end if level 3 and lives = 0
  if (isL3 && state.lives === 0) {
    setTimeout(() => {
      state.screen = 'result';
      render();
    }, 1600);
  }
}

function nextQuestion() {
  const lv = LEVELS[state.level];
  const isL3 = state.level === 3;

  // Check lives in L3
  if (isL3 && state.lives === 0) {
    state.screen = 'result';
    render();
    return;
  }

  if (state.questionIndex + 1 >= lv.questions.length) {
    state.screen = 'result';
    render();
  } else {
    state.questionIndex++;
    state.answered = false;
    state.selectedOpt = null;
    state.screen = 'game';
    render();
  }
}

function goMenu() {
  state.screen = 'menu';
  render();
}

// Init
render();
</script>

</body>
</html>
